blueprint:
  name: Dreame Vacuum Notifications
  description: Send a mobile notification when Dreame vacuum changes state.
  domain: automation
  input:
    vacuum_entity:
      name: Dreame Vacuum
      description: Select your Dreame vacuum entity
      selector:
        entity:
          domain: vacuum
    notify_service:
      name: Notify Service
      description: The notify service to use (e.g., notify.mobile_app_yourphone)
      default: notify.mobile_app_yourphone
      selector:
        text:

trigger:
  - platform: state
    entity_id: !input vacuum_entity

action:
  - service: !input notify_service
    data:
      title: "Dreame Vacuum Update"
      message: >
        Your Dreame is now {{ states(vacuum_entity) }}.
        {% if state_attr(vacuum_entity, 'error') %}
        Error: {{ state_attr(vacuum_entity, 'error') }}
        {% endif %}

mode: single
